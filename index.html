<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orçamento – Trembala Audio</title>
<style>
:root{
  --laranja:#E8952A;--teal:#2A8C7A;--azul:#2D4A8C;
  --cinza:#9B9B9B;--preto:#1A1A1A;--fundo:#F8F8F8;
  --linha:#D5D5D5;--branco:#FFFFFF;
  --fonte:'Calibri','Carlito','Arial',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fonte);font-size:10pt;background:var(--fundo);color:var(--preto);line-height:1.45;}
header{background:var(--branco);border-bottom:3px solid var(--laranja);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo-img{height:60px;}
.hdr-right{text-align:right;}
.hdr-lbl{font-size:16pt;font-weight:700;color:var(--azul);display:block;letter-spacing:1px;}
.wrap{max-width:960px;margin:0 auto;padding:16px 20px 40px;}
.btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.btn{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-family:var(--fonte);font-size:9pt;font-weight:700;display:flex;align-items:center;gap:5px;}
.btn-p{background:var(--laranja);color:#fff;}
.btn-s{background:var(--teal);color:#fff;}
.btn-o{background:transparent;color:var(--preto);border:1.5px solid var(--linha);}
.btn-o:hover{border-color:var(--laranja);color:var(--laranja);}
.card{background:var(--branco);border:1px solid var(--linha);border-radius:8px;margin-bottom:12px;}
.card-h{background:var(--azul);color:#fff;padding:7px 16px;font-size:8pt;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:7px;border-radius:8px 8px 0 0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--laranja);flex-shrink:0;}
.card-b{padding:14px 16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fg{display:flex;flex-direction:column;}
.fg label{font-size:7.5pt;color:var(--cinza);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;}
.fg input,.fg select{border:1px solid var(--linha);border-radius:4px;padding:5px 8px;font-size:10pt;font-family:var(--fonte);background:var(--fundo);color:var(--preto);}
.print-val{display:none;}

/* contenteditable — funciona como textarea mas imprime inteiro */
.editable{
  width:100%;min-height:100px;border:1px solid var(--linha);border-radius:4px;
  padding:9px 11px;font-size:10pt;font-family:var(--fonte);color:var(--preto);
  background:var(--fundo);line-height:1.7;white-space:pre-wrap;word-wrap:break-word;
  outline:none;
}
.editable:focus{border-color:var(--laranja);box-shadow:0 0 0 2px rgba(232,149,42,.2);}
.editable-desc{min-height:180px;}
.editable-info{min-height:100px;}
.editable-placeholder{color:#aaa;}

table.dec{width:100%;border-collapse:collapse;font-size:10pt;}
table.dec thead tr{background:var(--azul);color:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
table.dec thead th{padding:7px 9px;text-align:left;font-size:7.5pt;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;}
table.dec tbody tr:nth-child(even){background:#F9F9F9;}
table.dec tbody tr:hover{background:#FFF5E8;}
table.dec tbody td{padding:5px 9px;border-bottom:1px solid #EBEBEB;vertical-align:middle;}
.td-nome{font-weight:600;color:#333;}
.td-tot{font-weight:700;color:var(--teal);}
.qty-sel{width:58px;border:1px solid var(--linha);border-radius:3px;padding:3px 5px;font-size:9pt;font-family:var(--fonte);background:var(--fundo);}
.vunit-i{width:88px;text-align:right;border:1px solid var(--linha);border-radius:3px;padding:3px 5px;font-size:9pt;font-family:var(--fonte);background:var(--fundo);}
.obs-i{width:100%;border:1px solid var(--linha);border-radius:3px;padding:3px 6px;font-size:9pt;font-family:var(--fonte);background:var(--fundo);color:var(--preto);}
.vubar{background:#F0F4FB;border-top:1px solid var(--linha);padding:10px 16px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.vurow{display:flex;align-items:center;gap:12px;}
.vubar label{font-size:8pt;color:var(--cinza);letter-spacing:.8px;text-transform:uppercase;}
.vubar input{border:1px solid var(--linha);border-radius:4px;padding:5px 10px;font-size:11pt;font-family:var(--fonte);background:var(--branco);width:220px;text-align:right;font-weight:700;color:var(--preto);}
.vu-ext{font-size:9pt;color:var(--cinza);font-style:italic;min-height:14px;}
.totbar{background:var(--azul);border-top:3px solid var(--laranja);padding:10px 16px;display:flex;justify-content:flex-end;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.t-label{font-size:7.5pt;color:#AAC;letter-spacing:1.5px;text-transform:uppercase;}
.t-val{font-size:16pt;font-weight:700;color:var(--laranja);}
.t-ext{font-size:8.5pt;color:#CCE;margin-top:1px;}
.assin{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;}
.ab label{font-size:7.5pt;color:var(--cinza);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;display:block;}
.ab input{width:100%;border:none;border-bottom:1px solid var(--linha);padding:4px 0;font-size:10pt;background:transparent;font-family:var(--fonte);}
.carimbo{padding:12px 0 0;}
.carimbo img{max-height:70px;}
.modal-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:10px;width:620px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.modal-head{background:var(--azul);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:#fff;font-size:20pt;cursor:pointer;line-height:1;padding:0 4px;}
.modal-body{overflow-y:auto;flex:1;padding:14px 18px;}
.modal-foot{padding:10px 18px;border-top:1px solid #e0e0e0;text-align:right;}
.orc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;gap:12px;}
.orc-nome{font-size:10pt;font-weight:700;}
.orc-meta{font-size:8.5pt;color:#999;margin-top:2px;}
.orc-acoes{display:flex;gap:8px;flex-shrink:0;}

@media print{
  @page{size:A4;margin:12mm;}
  body{background:#fff;font-size:10pt;}
  .btns,.modal-ov{display:none!important;}
  header{padding:6px 0;border-bottom:2.5px solid var(--laranja)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .wrap{padding:6px 0 12px;max-width:100%;}
  .card{margin-bottom:7px;border:1px solid #ccc;}
  .card-h{background:var(--azul)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:5px 12px;border-radius:0;}
  .card-b{padding:7px 12px;}
  .fg input,.fg select{display:none;}
  .print-val{display:block;font-weight:600;font-size:10pt;white-space:pre-wrap;word-wrap:break-word;}
  .editable{border:none;background:transparent;padding:0;min-height:0;}
  table.dec thead tr{background:var(--azul)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table.dec tbody tr:nth-child(even){background:#F9F9F9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table.dec tbody tr:hover{background:transparent;}
  .qty-sel,.vunit-i{border:none;background:transparent;-webkit-appearance:none;font-weight:600;}
  .obs-i{border:none;background:transparent;}
  .vubar{background:#F0F4FB!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .vubar input{border:none;background:transparent;font-weight:700;}
  .totbar{background:var(--azul)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .ab input{border-bottom:1px solid #999;}
}
</style>

<script>
function el(id){return document.getElementById(id);}

function fmtBRL(n){
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function numExt(n){
  var un=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  var dz=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  var ct=['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  if(!n)return 'Zero reais';n=Math.round(n);
  function c3(x){if(!x)return '';var s='',c=Math.floor(x/100),r=x%100;if(c)s+=(c==1&&r)?'cento':ct[c];if(r){if(s)s+=' e ';if(r<20)s+=un[r];else{s+=dz[Math.floor(r/10)];if(r%10)s+=' e '+un[r%10];}}return s;}
  var r=n,p=[];
  var b=Math.floor(r/1e9);r%=1e9;var m=Math.floor(r/1e6);r%=1e6;var ml=Math.floor(r/1e3);r%=1e3;
  if(b)p.push(c3(b)+(b==1?' bilhão':' bilhões'));
  if(m)p.push(c3(m)+(m==1?' milhão':' milhões'));
  if(ml)p.push(c3(ml)+' mil');if(r)p.push(c3(r));
  var t=p.join(' e ');return t.charAt(0).toUpperCase()+t.slice(1)+(n==1?' real':' reais');
}

/* Valor Total da Proposta — inserido manualmente, sem itens */
function parseValor(v){
  v=(v||'').replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',', '.');
  return parseFloat(v)||0;
}

function onValorTotal(val){
  var n = parseValor(val);
  el('valorTotalExt').textContent = n>0 ? numExt(n) : '';
}

function onValorTotalBlur(input){
  var n = parseValor(input.value);
  input.value = n>0 ? n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';
  onValorTotal(input.value);
}

function limpar(){
  if(!confirm('Limpar todos os valores?'))return;
  el('valorTotal').value='';
  el('valorTotalExt').textContent='';
}

/* Pegar e definir texto de contenteditable */
function getTexto(id){return el(id)?el(id).innerText:'';}
function setTexto(id,txt){if(el(id))el(id).innerText=txt||'';}

/* SALVAR / CARREGAR */
function coletarDados(){
  return{
    cliente:el('cliente').value,campanha:el('campanha').value,
    agencia:el('agencia').value,data:el('dtdoc').value,
    midias:el('midias').value,territorio:el('territorio').value,
    veiculacao:el('veiculacao').value,
    desc:getTexto('desc'),info:getTexto('info'),
    valorTotal:el('valorTotal').value
  };
}

function aplicarDados(d){
  el('cliente').value=d.cliente||'';el('campanha').value=d.campanha||'';
  el('agencia').value=d.agencia||'';el('dtdoc').value=d.data||'';
  el('midias').value=d.midias||'';el('territorio').value=d.territorio||'';
  el('veiculacao').value=d.veiculacao||'';
  setTexto('desc',d.desc||'');setTexto('info',d.info||'');
  el('valorTotal').value=d.valorTotal||'';
  onValorTotal(el('valorTotal').value);
}

function salvar(){
  try{
    var d = coletarDados();
    var nome = (d.cliente || 'Orçamento').trim();
    var chave = 'orc_' + Date.now();
    var lista = carrLista();
    lista.unshift({chave:chave, nome:nome, data:new Date().toLocaleDateString('pt-BR'), dados:d});
    localStorage.setItem('trembala_orcamento', JSON.stringify(lista));
    alert('Orçamento "' + nome + '" salvo!');
  }catch(e){
    alert('Não foi possível salvar: o armazenamento local está bloqueado neste navegador/contexto (ex.: abrir o arquivo direto do disco em alguns navegadores, modo privado ou cookies bloqueados). Tente abrir o arquivo a partir de um servidor local ou habilitar o armazenamento, ou use "Imprimir / PDF" para exportar.');
  }
}

function carrLista(){
  try{ return JSON.parse(localStorage.getItem('trembala_orcamento') || '[]'); }
  catch(e){ return []; }
}

function abrirModal(){el('mov').style.display='flex';renderLista();}
function fecharModal(){el('mov').style.display='none';}

function renderLista(){
  var lista = carrLista();
  var box = el('mlista');
  if(!lista.length){
    box.innerHTML='<p style="color:#999;text-align:center;padding:24px;">Nenhum orçamento salvo ainda.</p>';
    return;
  }
  var h = '';
  lista.forEach(function(reg){
    h += '<div class="orc-item">'
       + '<div><div class="orc-nome">' + reg.nome + '</div>'
       + '<div class="orc-meta">Salvo em ' + reg.data + '</div></div>'
       + '<div class="orc-acoes">'
       + '<button class="btn btn-p" style="font-size:8.5pt;padding:5px 12px;" onclick="carregarOrc(&quot;' + reg.chave + '&quot;)">Carregar</button>'
       + '<button class="btn btn-o" style="font-size:8.5pt;padding:5px 12px;color:#c00;border-color:#c00;" onclick="excluirOrc(&quot;' + reg.chave + '&quot;)">Excluir</button>'
       + '</div></div>';
  });
  box.innerHTML = h;
}

function carregarOrc(chave){
  var lista = carrLista();
  var reg = lista.find(function(r){return r.chave===chave;});
  if(!reg){alert('Não encontrado.');return;}
  if(!confirm('Carregar "' + reg.nome + '"? Os dados atuais serão substituídos.')) return;
  aplicarDados(reg.dados);
  fecharModal();
}

function excluirOrc(chave){
  if(!confirm('Excluir permanentemente?')) return;
  var lista = carrLista().filter(function(r){return r.chave!==chave;});
  localStorage.setItem('trembala_orcamento', JSON.stringify(lista));
  renderLista();
}

el('mov').onclick=function(e){if(e.target===this)fecharModal();};

/* Garante que o texto completo dos campos do cliente apareça na impressão,
   já que <input>/<select> não exibem texto que excede a largura visível */
function syncPrintVals(){
  el('cliente-pv').textContent = el('cliente').value;
  el('campanha-pv').textContent = el('campanha').value;
  el('agencia-pv').textContent = el('agencia').value;
  var dt = el('dtdoc').value; el('dtdoc-pv').textContent = dt ? dt.split('-').reverse().join('/') : '';
  el('midias-pv').textContent = el('midias').value;
  var tr = el('territorio'); el('territorio-pv').textContent = tr.options[tr.selectedIndex] ? tr.options[tr.selectedIndex].text : '';
  el('veiculacao-pv').textContent = el('veiculacao').value;
}
window.addEventListener('beforeprint', syncPrintVals);
